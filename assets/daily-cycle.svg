<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" font-family="'SF Mono', 'Cascadia Code', 'Fira Code', Consolas, monospace">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
  </defs>

  <rect width="800" height="300" rx="12" fill="url(#bg3)"/>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" fill="#e6edf3" font-size="16" font-weight="bold">Daily Cycle</text>
  <text x="400" y="54" text-anchor="middle" fill="#7d8590" font-size="11">what happens every day via cron</text>

  <!-- Step 1: Cron trigger -->
  <g transform="translate(30, 85)">
    <rect width="120" height="70" rx="8" fill="#1a2332" stroke="#7d8590" stroke-width="1.5"/>
    <text x="60" y="24" text-anchor="middle" fill="#e6edf3" font-size="11" font-weight="bold">Cron</text>
    <line x1="15" y1="34" x2="105" y2="34" stroke="#30363d" stroke-width="1"/>
    <text x="60" y="50" text-anchor="middle" fill="#7d8590" font-size="9">daily_trading.sh</text>
    <text x="60" y="64" text-anchor="middle" fill="#7d8590" font-size="9">runs each gen</text>
  </g>

  <!-- Arrow -->
  <line x1="150" y1="120" x2="175" y2="120" stroke="#30363d" stroke-width="1.5"/>
  <polygon points="180,120 173,115 173,125" fill="#30363d"/>

  <!-- Step 2: Fetch data -->
  <g transform="translate(185, 85)">
    <rect width="120" height="70" rx="8" fill="#1a2332" stroke="#79c0ff" stroke-width="1.5"/>
    <text x="60" y="24" text-anchor="middle" fill="#79c0ff" font-size="11" font-weight="bold">Fetch</text>
    <line x1="15" y1="34" x2="105" y2="34" stroke="#30363d" stroke-width="1"/>
    <text x="60" y="50" text-anchor="middle" fill="#7d8590" font-size="9">12 data sources</text>
    <text x="60" y="64" text-anchor="middle" fill="#7d8590" font-size="9">shared across all</text>
  </g>

  <!-- Arrow -->
  <line x1="305" y1="120" x2="330" y2="120" stroke="#30363d" stroke-width="1.5"/>
  <polygon points="335,120 328,115 328,125" fill="#30363d"/>

  <!-- Step 3: Screen -->
  <g transform="translate(340, 85)">
    <rect width="120" height="70" rx="8" fill="#1a2332" stroke="#7ee787" stroke-width="1.5"/>
    <text x="60" y="24" text-anchor="middle" fill="#7ee787" font-size="11" font-weight="bold">Screen</text>
    <line x1="15" y1="34" x2="105" y2="34" stroke="#30363d" stroke-width="1"/>
    <text x="60" y="50" text-anchor="middle" fill="#7d8590" font-size="9">12 strategies</text>
    <text x="60" y="64" text-anchor="middle" fill="#7d8590" font-size="9">generate signals</text>
  </g>

  <!-- Arrow -->
  <line x1="460" y1="120" x2="485" y2="120" stroke="#30363d" stroke-width="1.5"/>
  <polygon points="490,120 483,115 483,125" fill="#30363d"/>

  <!-- Step 4: Committee -->
  <g transform="translate(495, 85)">
    <rect width="120" height="70" rx="8" fill="#1a2332" stroke="#d2a8ff" stroke-width="1.5"/>
    <text x="60" y="24" text-anchor="middle" fill="#d2a8ff" font-size="11" font-weight="bold">Committee</text>
    <line x1="15" y1="34" x2="105" y2="34" stroke="#30363d" stroke-width="1"/>
    <text x="60" y="50" text-anchor="middle" fill="#7d8590" font-size="9">LLM synthesis</text>
    <text x="60" y="64" text-anchor="middle" fill="#7d8590" font-size="9">size + execute</text>
  </g>

  <!-- Arrow -->
  <line x1="615" y1="120" x2="640" y2="120" stroke="#30363d" stroke-width="1.5"/>
  <polygon points="645,120 638,115 638,125" fill="#30363d"/>

  <!-- Step 5: Report -->
  <g transform="translate(650, 85)">
    <rect width="120" height="70" rx="8" fill="#1a2332" stroke="#f0883e" stroke-width="1.5"/>
    <text x="60" y="24" text-anchor="middle" fill="#f0883e" font-size="11" font-weight="bold">Report</text>
    <line x1="15" y1="34" x2="105" y2="34" stroke="#30363d" stroke-width="1"/>
    <text x="60" y="50" text-anchor="middle" fill="#7d8590" font-size="9">daily markdown</text>
    <text x="60" y="64" text-anchor="middle" fill="#7d8590" font-size="9">P&amp;L + positions</text>
  </g>

  <!-- Generation boxes at bottom -->
  <g transform="translate(140, 200)">
    <rect width="520" height="75" rx="8" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
    <text x="260" y="22" text-anchor="middle" fill="#7d8590" font-size="10" font-weight="bold">GENERATION MANAGEMENT</text>
    <line x1="20" y1="32" x2="500" y2="32" stroke="#30363d" stroke-width="1"/>
    <text x="260" y="50" text-anchor="middle" fill="#8b949e" font-size="9">each generation = frozen code snapshot (git worktree) + independent state</text>
    <text x="260" y="66" text-anchor="middle" fill="#8b949e" font-size="9">A/B test code changes by running multiple generations in parallel</text>
  </g>
</svg>
